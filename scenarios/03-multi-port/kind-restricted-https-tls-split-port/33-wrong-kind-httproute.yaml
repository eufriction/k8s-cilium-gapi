---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/httproute_v1.json
#
# Negative test: this HTTPRoute targets the "tls" listener which only allows
# TLSRoute via allowedRoutes.kinds. The gateway should reject this route.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wrong-kind-http-route
  namespace: backend-a
  labels:
    app.kubernetes.io/part-of: demo
spec:
  parentRefs:
    - name: kind-restricted-https-tls-split-port-gateway
      namespace: gateway-system
      sectionName: tls
  hostnames:
    - api.example.test
  rules:
    - backendRefs:
        - name: api
          port: 80
