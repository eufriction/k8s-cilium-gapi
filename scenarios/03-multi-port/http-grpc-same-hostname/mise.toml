[env]
SCENARIO_SKIP_VAR = "X_SPLIT_PORT_GRPC_BROKEN"

[tasks.start]
extends = "scenario:start"
description = "Deploy the same-hostname split-ports scenario"
depends = ["//:kind:load:apps{% if usage.verbose %} --verbose{% endif %}", "//:cert-manager:install"]

[tasks.verify]
extends = "scenario:verify"
description = "Verify the same-hostname split-ports scenario"

[tasks.delete]
extends = "scenario:delete"
