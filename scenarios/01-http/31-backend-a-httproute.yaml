apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-a-route
  namespace: backend-a
  labels:
    app.kubernetes.io/part-of: demo
spec:
  parentRefs:
    - name: multi-namespace-gateway
      namespace: gateway-system
      sectionName: http
  hostnames:
    - backend-a.example.test
  rules:
    - backendRefs:
        - name: api
          port: 80
