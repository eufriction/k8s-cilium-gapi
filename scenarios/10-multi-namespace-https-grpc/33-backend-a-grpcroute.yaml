apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: backend-a-grpc-route
  namespace: backend-a
  labels:
    app.kubernetes.io/part-of: demo
spec:
  parentRefs:
    - name: https-grpc-multi-namespace-gateway
      namespace: gateway-system
      sectionName: grpcs
  hostnames:
    - grpc-a.example.test
  rules:
    - backendRefs:
        - name: grpc-api
          port: 9000
