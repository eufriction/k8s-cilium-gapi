[env]
SCENARIO_SKIP_VERSIONS = "1.19.1 1.19.3 1.20.0-pre.1"

[tasks.start]
extends = "scenario:start"
description = "Deploy the HTTPS + gRPC split-port scenario"
depends = ["//:kind:load:apps{% if usage.verbose %} --verbose{% endif %}", "//:cert-manager:install"]

[tasks.verify]
extends = "scenario:verify"
description = "Verify the HTTPS + gRPC split-port scenario"

[tasks.delete]
extends = "scenario:delete"
