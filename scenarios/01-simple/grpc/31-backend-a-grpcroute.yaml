---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/grpcroute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: grpc-backend-a-route
  namespace: grpc-backend-a
  labels:
    app.kubernetes.io/part-of: demo
spec:
  parentRefs:
    - name: grpc-multi-namespace-gateway
      namespace: gateway-system
      sectionName: grpcs
  hostnames:
    - grpc-a.example.test
  rules:
    - backendRefs:
        - name: grpc-api
          port: 9000
