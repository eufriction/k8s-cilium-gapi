---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/gateway_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ns-split-port-gateway
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: demo
spec:
  gatewayClassName: cilium
  listeners:
    - name: http-restricted
      protocol: HTTP
      port: 80
      hostname: "restricted.example.test"
      allowedRoutes:
        namespaces:
          from: Same
    - name: http-open
      protocol: HTTP
      port: 8080
      hostname: "open.example.test"
      allowedRoutes:
        namespaces:
          from: All
