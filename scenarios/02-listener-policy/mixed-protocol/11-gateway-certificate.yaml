apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mixed-protocol-gateway-certificate
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: demo
spec:
  secretName: mixed-protocol-gateway-tls
  commonName: app.example.test
  dnsNames:
    - app.example.test
    - localhost
  ipAddresses:
    - 127.0.0.1
  issuerRef:
    kind: Issuer
    name: mixed-protocol-selfsigned
