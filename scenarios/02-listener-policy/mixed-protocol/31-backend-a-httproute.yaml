---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-a-app-route
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: demo
spec:
  parentRefs:
    - name: mixed-protocol-gateway
      sectionName: https
  hostnames:
    - app.example.test
  rules:
    - backendRefs:
        - name: api
          namespace: backend-a
          port: 80
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: demo
spec:
  parentRefs:
    - name: mixed-protocol-gateway
      sectionName: http
  hostnames:
    - app.example.test
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: 443
            statusCode: 301
