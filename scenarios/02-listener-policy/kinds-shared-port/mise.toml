[env]
SCENARIO_SKIP_VAR = "X_ALLOWED_ROUTES_SHARED_PORT_BROKEN"

[tasks.start]
extends = "scenario:start"
description = "Deploy the shared-port + allowedRoutes.kinds scenario"
depends = ["//:kind:load:apps{% if usage.verbose %} --verbose{% endif %}", "//:cert-manager:install"]

[tasks.verify]
extends = "scenario:verify"
description = "Verify the shared-port + allowedRoutes.kinds scenario"

[tasks.delete]
extends = "scenario:delete"
