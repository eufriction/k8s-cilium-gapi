apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: scenario-26-gateway-certificate
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: demo
spec:
  secretName: scenario-26-gateway-tls
  commonName: web.example.test
  dnsNames:
    - web.example.test
    - localhost
  ipAddresses:
    - 127.0.0.1
  issuerRef:
    kind: Issuer
    name: scenario-26-selfsigned
