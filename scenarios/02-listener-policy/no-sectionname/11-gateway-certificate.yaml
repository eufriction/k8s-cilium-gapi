apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: no-sectionname-gateway-certificate
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: demo
spec:
  secretName: no-sectionname-gateway-tls
  commonName: web.example.test
  dnsNames:
    - web.example.test
    - localhost
  ipAddresses:
    - 127.0.0.1
  issuerRef:
    kind: Issuer
    name: no-sectionname-selfsigned
