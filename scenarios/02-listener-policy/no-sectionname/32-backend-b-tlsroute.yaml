---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/tlsroute_v1alpha2.json
#
# cilium/cilium#45050 — This TLSRoute intentionally omits sectionName.
# Per the Gateway API spec it should only attach to the "tls" listener
# (protocol: TLS). On Cilium 1.19.2 it incorrectly attaches to all
# three listeners, creating duplicate Envoy FilterChains that silently
# break passthrough traffic.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: backend-b-mtls-route
  namespace: backend-b
  labels:
    app.kubernetes.io/part-of: demo
spec:
  parentRefs:
    - name: mixed-listener-gateway
      namespace: gateway-system
      # sectionName intentionally omitted — should auto-attach to "tls" only
  hostnames:
    - mtls.example.test
  rules:
    - backendRefs:
        - name: backend-mtls
          port: 9443
