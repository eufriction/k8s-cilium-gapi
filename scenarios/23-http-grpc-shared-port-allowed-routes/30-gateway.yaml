apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-port-allowed-routes-gateway
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: demo
spec:
  gatewayClassName: cilium
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.example.test"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: shared-port-allowed-routes-gateway-tls
      allowedRoutes:
        namespaces:
          from: All
        kinds:
          - group: gateway.networking.k8s.io
            kind: GRPCRoute
          - group: gateway.networking.k8s.io
            kind: HTTPRoute
