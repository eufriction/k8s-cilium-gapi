[settings]
env_shell_expand = true
# Cilium fix for #44889 (split-port GRPCRoute 404) rebased on fix/server-names-dedup (#45623)
# Based on fix/server-names-dedup (which is based on upstream/main f0f4035d0b)
[env]
CILIUM_VERSION = "branch"
CILIUM_CHART_DIR = "../cilium/install/kubernetes/cilium"
CILIUM_AGENT_IMAGE = ""
CILIUM_OPERATOR_IMAGE = "localhost:5000/cilium/operator-generic:local"
GATEWAY_API_VERSION = "1.5.1"
X_GRPCROUTE_ACCEPTED_MSG = "Accepted GRPCRoute"
X_TLSROUTE_ACCEPTED_MSG = "Accepted TLSRoute"
X_TLSROUTE_API_VERSION = "v1"
