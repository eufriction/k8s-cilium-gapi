[settings]
env_shell_expand = true
# Cilium fix/server-names-dedup branch — fixes #45623 (duplicate server_names)
# Based on upstream/main (f0f4035d0b)
[env]
CILIUM_VERSION = "branch"
CILIUM_CHART_DIR = "/Users/aa100324/Code/eufriction/cilium/install/kubernetes/cilium"
CILIUM_AGENT_IMAGE = ""
CILIUM_OPERATOR_IMAGE = "localhost:5000/cilium/operator-generic:local"
GATEWAY_API_VERSION = "1.5.1"
X_GRPCROUTE_ACCEPTED_MSG = "Accepted GRPCRoute"
X_TLSROUTE_ACCEPTED_MSG = "Accepted TLSRoute"
X_TLSROUTE_API_VERSION = "v1"
# Fixed on main (since 1.19.0)
X_ALLOWED_ROUTES_SHARED_PORT_BROKEN = "false"
# NOT fixed — cilium#45050 (TLSRoute no-sectionName duplicate FilterChains)
X_TLSROUTE_NO_SECTIONNAME_BROKEN = "true"
# NOT fixed — cilium#44877 (same-hostname GRPCRoutes 404); needs #44889
X_SPLIT_PORT_GRPC_BROKEN = "true"
# NOT fixed — cilium#45559 (CheckGatewayRouteKindAllowed)
X_ALLOWED_ROUTES_SEPARATE_PORT_BROKEN = "true"
# NOT fixed — cilium#42159 (CheckGatewayAllowedForNamespace)
X_ALLOWED_ROUTES_NAMESPACES_BROKEN = "true"
# NOT fixed — cilium#42898 (TLS split-port)
X_TLS_PASSTHROUGH_SPLIT_PORTS_BROKEN = "true"
# NOT fixed — cilium#44889 + cilium#45371 (HTTPS+TLS split-port)
X_HTTPS_TLS_SPLIT_PORT_BROKEN = "true"
