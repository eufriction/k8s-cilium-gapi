# Cilium branch build — local chart directory
# Set CILIUM_CHART_DIR to the path of your local cilium/install/kubernetes/cilium
[env]
CILIUM_VERSION = "branch"
CILIUM_CHART_DIR = ""
GATEWAY_API_VERSION = "1.5.1"
X_GRPCROUTE_ACCEPTED_MSG = "Accepted GRPCRoute"
X_TLSROUTE_ACCEPTED_MSG = "Accepted TLSRoute"
X_TLSROUTE_API_VERSION = "v1"
X_ALLOWED_ROUTES_SEPARATE_PORT_BROKEN = "true"
X_ALLOWED_ROUTES_SHARED_PORT_BROKEN = "false"
X_SPLIT_PORT_GRPC_BROKEN = "true"
