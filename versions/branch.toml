# Cilium branch build — local chart + images
# Set CILIUM_CHART_DIR to your local cilium/install/kubernetes/cilium
# Set CILIUM_AGENT_IMAGE / CILIUM_OPERATOR_IMAGE to locally-built image refs
[env]
CILIUM_VERSION = "branch"
CILIUM_CHART_DIR = "$HOME/Code/eufriction/cilium/install/kubernetes/cilium"
CILIUM_AGENT_IMAGE = ""
CILIUM_OPERATOR_IMAGE = "localhost:5000/cilium/operator-generic:local"
GATEWAY_API_VERSION = "1.5.1"
X_GRPCROUTE_ACCEPTED_MSG = "Accepted GRPCRoute"
X_TLSROUTE_ACCEPTED_MSG = "Accepted TLSRoute"
X_TLSROUTE_API_VERSION = "v1"
X_ALLOWED_ROUTES_SEPARATE_PORT_BROKEN = "false"
X_ALLOWED_ROUTES_SHARED_PORT_BROKEN = "false"
X_SPLIT_PORT_GRPC_BROKEN = "false"
X_TLSROUTE_NO_SECTIONNAME_BROKEN = "false"
X_TLS_PASSTHROUGH_SPLIT_PORTS_BROKEN = "false"
X_ALLOWED_ROUTES_NAMESPACES_BROKEN = "false"
