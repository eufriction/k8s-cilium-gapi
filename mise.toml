[tools]
hk = "latest"
pkl = "latest"
k9s = "latest"
kind = "latest"
kubectl = "latest"
grpcurl = "latest"
go = "latest"
helm = "latest"
cilium-cli = "latest"
cilium-hubble = "latest"
kyverno = "latest"
node = "latest"
prettier = "latest"
vale = "latest"

[hooks]
enter = "hk install"

[tasks.lint]
description = "Run all pre-commit checks against all files"
run = "hk run pre-commit --all"

[env]
NETSHOOT_VERSION = "v0.15"
HTTPBIN_VERSION = "2.20.0"
ENVOY_VERSION = "1.33.2"
BACKEND_GRPC_VERSION = "0.1.1"
CILIUM_VERSION = "1.19.1"
HUBBLE_UI_VERSION = "0.13.3"
CILIUM_ENVOY_VERSION = "1.35.9-1770979049-232ed4a26881e4ab4f766f251f258ed424fff663"
CLOUD_PROVIDER_KIND_VERSION = "0.8.0"
CERT_MANAGER_VERSION = "1.20.0"
GATEWAY_API_VERSION = "1.5.0"
KYVERNO_CHART_VERSION = "3.7.0"
KYVERNO_APP_VERSION = "1.17.0"
KIND_CLUSTER_NAME = "k8s-cilium-gapi"

[tasks."kind:start"]
description = "Create the k8s-cilium-gapi kind cluster using config/kind.config"
run = "kind create cluster --config config/kind.config"

[tasks."kind:start:lb"]
description = "Create the k8s-cilium-gapi kind cluster using config/kind.lb.config"
run = "kind create cluster --config config/kind.lb.config"

[tasks."kind:delete"]
description = "Delete the k8s-cilium-gapi kind cluster"
run = "kind delete cluster --name $KIND_CLUSTER_NAME"

[tasks."kind:restart"]
description = "Delete and recreate the k8s-cilium-gapi kind cluster"
depends = ["kind:delete"]
run = "mise run kind:start"

[tasks."helm:repo:add"]
description = "Add the Cilium and Kyverno Helm repos"
run = [
  "helm repo add cilium https://helm.cilium.io/",
  "helm repo add kyverno https://kyverno.github.io/kyverno/",
  "helm repo update"
]

[tasks."cilium:pull"]
description = "Pull Cilium images from the registry to the local Docker daemon"
run = [
  "docker pull quay.io/cilium/cilium:v$CILIUM_VERSION",
  "docker pull quay.io/cilium/operator-generic:v$CILIUM_VERSION",
  "docker pull quay.io/cilium/hubble-relay:v$CILIUM_VERSION",
  "docker pull quay.io/cilium/hubble-ui:v$HUBBLE_UI_VERSION",
  "docker pull quay.io/cilium/hubble-ui-backend:v$HUBBLE_UI_VERSION",
  "docker pull quay.io/cilium/cilium-envoy:v$CILIUM_ENVOY_VERSION",
]

[tasks."cilium:load"]
description = "Load Cilium images from the local Docker daemon into the kind cluster nodes"
depends = ["cilium:pull"]
run = [
  "kind load docker-image quay.io/cilium/cilium:v$CILIUM_VERSION --name $KIND_CLUSTER_NAME",
  "kind load docker-image quay.io/cilium/operator-generic:v$CILIUM_VERSION --name $KIND_CLUSTER_NAME",
  "kind load docker-image quay.io/cilium/hubble-relay:v$CILIUM_VERSION --name $KIND_CLUSTER_NAME",
  "kind load docker-image quay.io/cilium/hubble-ui:v$HUBBLE_UI_VERSION --name $KIND_CLUSTER_NAME",
  "kind load docker-image quay.io/cilium/hubble-ui-backend:v$HUBBLE_UI_VERSION --name $KIND_CLUSTER_NAME",
  "kind load docker-image quay.io/cilium/cilium-envoy:v$CILIUM_ENVOY_VERSION --name $KIND_CLUSTER_NAME",
]

[tasks."kyverno:pull"]
description = "Pull Kyverno images from the registry to the local Docker daemon"
run = [
  "docker pull ghcr.io/kyverno/kyverno:v$KYVERNO_APP_VERSION",
  "docker pull ghcr.io/kyverno/background-controller:v$KYVERNO_APP_VERSION",
  "docker pull ghcr.io/kyverno/cleanup-controller:v$KYVERNO_APP_VERSION",
  "docker pull ghcr.io/kyverno/reports-controller:v$KYVERNO_APP_VERSION",
]

[tasks."kyverno:load"]
description = "Load Kyverno images from the local Docker daemon into the kind cluster nodes"
depends = ["kyverno:pull"]
run = [
  "kind load docker-image ghcr.io/kyverno/kyverno:v$KYVERNO_APP_VERSION --name $KIND_CLUSTER_NAME",
  "kind load docker-image ghcr.io/kyverno/background-controller:v$KYVERNO_APP_VERSION --name $KIND_CLUSTER_NAME",
  "kind load docker-image ghcr.io/kyverno/cleanup-controller:v$KYVERNO_APP_VERSION --name $KIND_CLUSTER_NAME",
  "kind load docker-image ghcr.io/kyverno/reports-controller:v$KYVERNO_APP_VERSION --name $KIND_CLUSTER_NAME",
]

[tasks."apps:pull"]
description = "Pull remote demo app images from the registry to the local Docker daemon"
run = [
  "docker pull nicolaka/netshoot:$NETSHOOT_VERSION",
  "docker pull mccutchen/go-httpbin:$HTTPBIN_VERSION",
  "docker pull envoyproxy/envoy:v$ENVOY_VERSION",
]

[tasks."apps:build"]
description = "Build local demo app images"
run = [
  "docker build -t backend-grpc:$BACKEND_GRPC_VERSION apps/backend-grpc/image",
]

[tasks."apps:load"]
description = "Load demo app images from the local Docker daemon into the kind cluster nodes"
depends = ["apps:pull", "apps:build"]
run = [
  "kind load docker-image nicolaka/netshoot:$NETSHOOT_VERSION --name $KIND_CLUSTER_NAME",
  "kind load docker-image mccutchen/go-httpbin:$HTTPBIN_VERSION --name $KIND_CLUSTER_NAME",
  "kind load docker-image backend-grpc:$BACKEND_GRPC_VERSION --name $KIND_CLUSTER_NAME",
  "kind load docker-image envoyproxy/envoy:v$ENVOY_VERSION --name $KIND_CLUSTER_NAME",
]

[tasks."cilium:uninstall"]
description = "Uninstall Cilium from the cluster using Helm"
run = "helm uninstall cilium --namespace kube-system"

[tasks."gateway-api:install"]
description = "Install Gateway API experimental CRDs before enabling Cilium Gateway API support"
run = """
kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v$GATEWAY_API_VERSION/experimental-install.yaml
"""

[tasks."cloud-provider-kind:install"]
description = "Install cloud-provider-kind into .bin for load-balancer scenarios"
run = """
mkdir -p .bin
GOBIN=$PWD/.bin go install sigs.k8s.io/cloud-provider-kind@v$CLOUD_PROVIDER_KIND_VERSION
"""

[tasks."cloud-provider-kind:start"]
description = "Start cloud-provider-kind in a dedicated terminal for load-balancer scenarios"
depends = ["cloud-provider-kind:install"]
run = "sudo --preserve-env=KUBECONFIG ./.bin/cloud-provider-kind -enable-lb-port-mapping"

[tasks."cert-manager:install"]
description = "Install cert-manager for TLS-focused scenarios"
depends_post = ["cert-manager:verify"]
run = """
helm upgrade --install cert-manager oci://quay.io/jetstack/charts/cert-manager \
  --namespace cert-manager \
  --create-namespace \
  --version v$CERT_MANAGER_VERSION \
  --set crds.enabled=true \
  --set prometheus.enabled=false \
  --wait \
  --timeout 5m
"""

[tasks."cert-manager:verify"]
description = "Verify the cert-manager control plane and CRDs are ready"
run = """
kubectl wait deployment/cert-manager -n cert-manager --for=condition=Available --timeout=180s
kubectl wait deployment/cert-manager-cainjector -n cert-manager --for=condition=Available --timeout=180s
kubectl wait deployment/cert-manager-webhook -n cert-manager --for=condition=Available --timeout=180s
kubectl get crd certificates.cert-manager.io issuers.cert-manager.io clusterissuers.cert-manager.io >/dev/null
"""

[tasks."cert-manager:delete"]
description = "Remove cert-manager when TLS scenarios are no longer needed"
run = [
  "helm uninstall cert-manager --namespace cert-manager --ignore-not-found",
  "kubectl delete namespace cert-manager --ignore-not-found=true --wait=false"
]

[tasks."kyverno:install"]
description = "Install Kyverno for future policy-focused scenarios"
depends = ["helm:repo:add", "kyverno:load"]
depends_post = ["kyverno:verify"]
run = """
helm upgrade --install kyverno kyverno/kyverno \
  --namespace kyverno \
  --create-namespace \
  --version $KYVERNO_CHART_VERSION \
  --values config/values.kyverno.yaml \
  --wait \
  --timeout 5m
"""
run_windows = """
helm upgrade --install kyverno kyverno/kyverno `
  --namespace kyverno `
  --create-namespace `
  --version $env:KYVERNO_CHART_VERSION `
  --values config/values.kyverno.yaml `
  --wait `
  --timeout 5m
"""

[tasks."kyverno:verify"]
description = "Verify the Kyverno control plane is ready"
run = """
kubectl wait deployment/kyverno-admission-controller -n kyverno --for=condition=Available --timeout=180s
kubectl wait deployment/kyverno-background-controller -n kyverno --for=condition=Available --timeout=180s
kubectl wait deployment/kyverno-cleanup-controller -n kyverno --for=condition=Available --timeout=180s
kubectl wait deployment/kyverno-reports-controller -n kyverno --for=condition=Available --timeout=180s
"""

[tasks."kyverno:delete"]
description = "Remove Kyverno when policy-focused scenarios are no longer needed"
run = [
  "helm uninstall kyverno --namespace kyverno --ignore-not-found",
  "kubectl delete namespace kyverno --ignore-not-found=true --wait=false"
]

[tasks."cilium:install"]
description = "Install Cilium in kube-proxy-free mode using Helm"
depends = ["helm:repo:add", "cilium:load", "gateway-api:install"]
run = """
APISERVER_IP=$(docker inspect -f '{% raw %}{{.NetworkSettings.Networks.kind.IPAddress}}{% endraw %}' ${KIND_CLUSTER_NAME}-control-plane)
if [ -z "$APISERVER_IP" ]; then
  echo "ERROR: could not resolve control-plane IP from Docker – is the kind cluster running?" >&2
  exit 1
fi
helm install cilium cilium/cilium \
  --namespace kube-system \
  --version $CILIUM_VERSION \
  --values config/values.cilium.yaml \
  --set k8sServiceHost=$APISERVER_IP \
  --set k8sServicePort=6443 \
  --set securityContext.privileged=true
"""
run_windows = """
$APISERVER_IP = docker inspect -f '{% raw %}{{.NetworkSettings.Networks.kind.IPAddress}}{% endraw %}' "${env:KIND_CLUSTER_NAME}-control-plane"
if (-not $APISERVER_IP) {
  Write-Error "ERROR: could not resolve control-plane IP from Docker - is the kind cluster running?"
  exit 1
}
helm install cilium cilium/cilium `
  --namespace kube-system `
  --version $env:CILIUM_VERSION `
  --values config/values.cilium.yaml `
  --set k8sServiceHost=$APISERVER_IP `
  --set k8sServicePort=6443
"""

[tasks."cilium:install:lb"]
description = "Install Cilium in load-balancer mode for Gateway API comparison scenarios"
depends = ["helm:repo:add", "cilium:load", "gateway-api:install"]
run = """
APISERVER_IP=$(docker inspect -f '{% raw %}{{.NetworkSettings.Networks.kind.IPAddress}}{% endraw %}' ${KIND_CLUSTER_NAME}-control-plane)
if [ -z "$APISERVER_IP" ]; then
  echo "ERROR: could not resolve control-plane IP from Docker – is the kind cluster running?" >&2
  exit 1
fi
helm install cilium cilium/cilium \
  --namespace kube-system \
  --version $CILIUM_VERSION \
  --values config/values.cilium.lb.yaml \
  --set k8sServiceHost=$APISERVER_IP \
  --set k8sServicePort=6443 \
  --set securityContext.privileged=true
"""
run_windows = """
$APISERVER_IP = docker inspect -f '{% raw %}{{.NetworkSettings.Networks.kind.IPAddress}}{% endraw %}' "${env:KIND_CLUSTER_NAME}-control-plane"
if (-not $APISERVER_IP) {
  Write-Error "ERROR: could not resolve control-plane IP from Docker - is the kind cluster running?"
  exit 1
}
helm install cilium cilium/cilium `
  --namespace kube-system `
  --version $env:CILIUM_VERSION `
  --values config/values.cilium.lb.yaml `
  --set k8sServiceHost=$APISERVER_IP `
  --set k8sServicePort=6443
"""

[tasks."scenario:01:start"]
description = "Deploy the multi-namespace HTTP Gateway API scenario"
depends = ["apps:load"]
depends_post = ["scenario:01:verify"]
run = "kubectl apply -k scenarios/01-http/"

[tasks."scenario:01:delete"]
description = "Delete the multi-namespace HTTP Gateway API scenario"
run = "kubectl delete -k scenarios/01-http/ --ignore-not-found"

[tasks."scenario:01:restart"]
description = "Tear down and recreate the multi-namespace HTTP Gateway API scenario"
depends = ["scenario:01:delete"]
run = "mise run scenario:01:start"

[tasks."scenario:01:verify"]
description = "Verify the multi-namespace HTTP Gateway API scenario is healthy"
run = """
kubectl wait pod/netshoot-client -n client --for=condition=Ready --timeout=60s
kubectl wait pod/api -n backend-a --for=condition=Ready --timeout=60s
kubectl wait pod/api -n backend-b --for=condition=Ready --timeout=60s
kubectl wait gateway/multi-namespace-gateway -n gateway-system --for='jsonpath={.status.conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait httproute/backend-a-route -n backend-a --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait httproute/backend-b-route -n backend-b --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
curl -fsS -H 'Host: backend-a.example.test' http://localhost/headers >/dev/null
curl -fsS -H 'Host: backend-b.example.test' http://localhost/headers >/dev/null
"""

[tasks."scenario:02:start"]
description = "Deploy the host-network multi-namespace TLS gRPC Gateway API scenario"
depends = ["apps:load", "cert-manager:install"]
depends_post = ["scenario:02:verify"]
run = "kubectl apply -k scenarios/02-grpc/"

[tasks."scenario:02:delete"]
description = "Delete the host-network multi-namespace TLS gRPC Gateway API scenario"
run = "kubectl delete -k scenarios/02-grpc/ --ignore-not-found"

[tasks."scenario:02:restart"]
description = "Tear down and recreate the host-network multi-namespace TLS gRPC Gateway API scenario"
depends = ["scenario:02:delete"]
run = "mise run scenario:02:start"

[tasks."scenario:02:verify"]
description = "Verify the host-network multi-namespace TLS gRPC Gateway API scenario is healthy"
run = """
kubectl wait pod/grpc-api -n grpc-backend-a --for=condition=Ready --timeout=60s
kubectl wait pod/grpc-api -n grpc-backend-b --for=condition=Ready --timeout=60s
kubectl wait certificate/grpc-multi-namespace-gateway-certificate -n gateway-system --for=condition=Ready --timeout=180s
kubectl wait gateway/grpc-multi-namespace-gateway -n gateway-system --for='jsonpath={.status.conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait grpcroute/grpc-backend-a-route -n grpc-backend-a --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait grpcroute/grpc-backend-b-route -n grpc-backend-b --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
grpcurl -insecure \
  -authority grpc-a.example.test \
  -proto apps/backend-grpc/proto/grpc/testing/testservice.proto \
  -d '{"response_size":32,"fill_server_id":true}' \
  localhost:443 \
  grpc.testing.TestService/UnaryCall >/dev/null
grpcurl -insecure \
  -authority grpc-b.example.test \
  -proto apps/backend-grpc/proto/grpc/testing/testservice.proto \
  -d '{"response_size":32,"fill_server_id":true}' \
  localhost:443 \
  grpc.testing.TestService/UnaryCall >/dev/null
"""

[tasks."scenario:03:start"]
description = "Deploy the HTTPS termination baseline scenario"
depends = ["apps:load", "cert-manager:install"]
depends_post = ["scenario:03:verify"]
run = "kubectl apply -k scenarios/03-https/"

[tasks."scenario:03:delete"]
description = "Delete the HTTPS termination baseline scenario"
run = "kubectl delete -k scenarios/03-https/ --ignore-not-found"

[tasks."scenario:03:restart"]
description = "Tear down and recreate the HTTPS termination baseline scenario"
depends = ["scenario:03:delete"]
run = "mise run scenario:03:start"

[tasks."scenario:03:verify"]
description = "Verify the HTTPS termination baseline scenario is healthy"
run = """
kubectl wait pod/netshoot-client -n client --for=condition=Ready --timeout=60s
kubectl wait pod/api -n backend-a --for=condition=Ready --timeout=60s
kubectl wait pod/api -n backend-b --for=condition=Ready --timeout=60s
kubectl wait certificate/https-gateway-certificate -n gateway-system --for=condition=Ready --timeout=180s
kubectl wait gateway/https-multi-namespace-gateway -n gateway-system --for='jsonpath={.status.conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait httproute/backend-a-https-route -n backend-a --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait httproute/backend-b-https-route -n backend-b --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
curl -kfsS --resolve "https-a.example.test:443:127.0.0.1" https://https-a.example.test/headers >/dev/null
curl -kfsS --resolve "https-b.example.test:443:127.0.0.1" https://https-b.example.test/headers >/dev/null
"""

[tasks."scenario:04:start"]
description = "Deploy the multi-namespace mTLS Gateway API scenario"
depends = ["apps:load", "cert-manager:install"]
depends_post = ["scenario:04:verify"]
run = "kubectl apply -k scenarios/04-mtls/"

[tasks."scenario:04:delete"]
description = "Delete the multi-namespace mTLS Gateway API scenario"
run = "kubectl delete -k scenarios/04-mtls/ --ignore-not-found"

[tasks."scenario:04:restart"]
description = "Tear down and recreate the multi-namespace mTLS Gateway API scenario"
depends = ["scenario:04:delete"]
run = "mise run scenario:04:start"

[tasks."scenario:04:verify"]
description = "Verify the multi-namespace mTLS Gateway API scenario is healthy"
run = """
set -euo pipefail
kubectl wait pod/backend-mtls -n backend-a --for=condition=Ready --timeout=60s
kubectl wait pod/backend-mtls -n backend-b --for=condition=Ready --timeout=60s
kubectl wait certificate/backend-a-mtls-ca -n backend-a --for=condition=Ready --timeout=180s
kubectl wait certificate/backend-a-mtls-server -n backend-a --for=condition=Ready --timeout=180s
kubectl wait certificate/backend-a-mtls-client -n backend-a --for=condition=Ready --timeout=180s
kubectl wait certificate/backend-b-mtls-ca -n backend-b --for=condition=Ready --timeout=180s
kubectl wait certificate/backend-b-mtls-server -n backend-b --for=condition=Ready --timeout=180s
kubectl wait certificate/backend-b-mtls-client -n backend-b --for=condition=Ready --timeout=180s
kubectl wait gateway/mtls-multi-namespace-gateway -n gateway-system --for='jsonpath={.status.conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait tlsroute/backend-a-mtls-route -n backend-a --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait tlsroute/backend-b-mtls-route -n backend-b --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s

TMPDIR=$(mktemp -d)
trap 'rm -rf "$TMPDIR"' EXIT

# Extract backend-a certs
kubectl get secret backend-a-mtls-server -n backend-a -o jsonpath='{.data.ca\\.crt}' | base64 -d > "$TMPDIR/a-ca.crt"
kubectl get secret backend-a-mtls-client -n backend-a -o jsonpath='{.data.tls\\.crt}' | base64 -d > "$TMPDIR/a-client.crt"
kubectl get secret backend-a-mtls-client -n backend-a -o jsonpath='{.data.tls\\.key}' | base64 -d > "$TMPDIR/a-client.key"

# Extract backend-b certs
kubectl get secret backend-b-mtls-server -n backend-b -o jsonpath='{.data.ca\\.crt}' | base64 -d > "$TMPDIR/b-ca.crt"
kubectl get secret backend-b-mtls-client -n backend-b -o jsonpath='{.data.tls\\.crt}' | base64 -d > "$TMPDIR/b-client.crt"
kubectl get secret backend-b-mtls-client -n backend-b -o jsonpath='{.data.tls\\.key}' | base64 -d > "$TMPDIR/b-client.key"

# Positive: backend-a with correct client cert
curl -fsS --resolve "mtls-a.example.test:9443:127.0.0.1" \
  --cacert "$TMPDIR/a-ca.crt" \
  --cert "$TMPDIR/a-client.crt" \
  --key "$TMPDIR/a-client.key" \
  https://mtls-a.example.test:9443/ >/dev/null
echo "PASS: backend-a accepts correct client cert"

# Positive: backend-b with correct client cert
curl -fsS --resolve "mtls-b.example.test:9443:127.0.0.1" \
  --cacert "$TMPDIR/b-ca.crt" \
  --cert "$TMPDIR/b-client.crt" \
  --key "$TMPDIR/b-client.key" \
  https://mtls-b.example.test:9443/ >/dev/null
echo "PASS: backend-b accepts correct client cert"

# Negative: backend-a without client cert (must fail)
if curl -fsS --resolve "mtls-a.example.test:9443:127.0.0.1" \
  --cacert "$TMPDIR/a-ca.crt" \
  https://mtls-a.example.test:9443/ >/dev/null 2>&1; then
  echo "FAIL: backend-a should reject requests without client cert" >&2
  exit 1
fi
echo "PASS: backend-a rejects missing client cert"

# Negative: backend-b with backend-a's client cert (must fail — CA isolation)
if curl -fsS --resolve "mtls-b.example.test:9443:127.0.0.1" \
  --cacert "$TMPDIR/b-ca.crt" \
  --cert "$TMPDIR/a-client.crt" \
  --key "$TMPDIR/a-client.key" \
  https://mtls-b.example.test:9443/ >/dev/null 2>&1; then
  echo "FAIL: backend-b should reject backend-a client cert (CA isolation)" >&2
  exit 1
fi
echo "PASS: backend-b rejects cross-namespace client cert"
"""

[tasks."scenario:20:start"]
description = "Deploy the host-network multi-namespace HTTPS + gRPC Gateway API scenario"
depends = ["apps:load", "cert-manager:install"]
depends_post = ["scenario:20:verify"]
run = "kubectl apply -k scenarios/20-http-grpc/"

[tasks."scenario:20:delete"]
description = "Delete the host-network multi-namespace HTTPS + gRPC Gateway API scenario"
run = "kubectl delete -k scenarios/20-http-grpc/ --ignore-not-found"

[tasks."scenario:20:restart"]
description = "Tear down and recreate the host-network multi-namespace HTTPS + gRPC Gateway API scenario"
depends = ["scenario:20:delete"]
run = "mise run scenario:20:start"

[tasks."scenario:20:verify"]
description = "Verify the host-network multi-namespace HTTPS + gRPC Gateway API scenario is healthy"
run = """
kubectl wait pod/api -n backend-a --for=condition=Ready --timeout=60s
kubectl wait pod/api -n backend-b --for=condition=Ready --timeout=60s
kubectl wait pod/grpc-api -n backend-a --for=condition=Ready --timeout=60s
kubectl wait pod/grpc-api -n backend-b --for=condition=Ready --timeout=60s
kubectl wait certificate/https-grpc-gateway-certificate -n gateway-system --for=condition=Ready --timeout=180s
kubectl wait gateway/https-grpc-multi-namespace-gateway -n gateway-system --for='jsonpath={.status.conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait httproute/backend-a-https-route -n backend-a --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait httproute/backend-b-https-route -n backend-b --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait grpcroute/backend-a-grpc-route -n backend-a --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait grpcroute/backend-b-grpc-route -n backend-b --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
curl -kfsS --resolve "https-a.example.test:443:127.0.0.1" https://https-a.example.test/headers >/dev/null
curl -kfsS --resolve "https-b.example.test:443:127.0.0.1" https://https-b.example.test/headers >/dev/null
grpcurl -insecure \
  -authority grpc-a.example.test \
  -proto apps/backend-grpc/proto/grpc/testing/testservice.proto \
  -d '{"response_size":32,"fill_server_id":true}' \
  localhost:50051 \
  grpc.testing.TestService/UnaryCall >/dev/null
grpcurl -insecure \
  -authority grpc-b.example.test \
  -proto apps/backend-grpc/proto/grpc/testing/testservice.proto \
  -d '{"response_size":32,"fill_server_id":true}' \
  localhost:50051 \
  grpc.testing.TestService/UnaryCall >/dev/null
"""

[tasks."scenario:21:start"]
description = "Deploy the shared-port HTTP + gRPC Gateway API scenario"
depends = ["apps:load", "cert-manager:install"]
depends_post = ["scenario:21:verify"]
run = "kubectl apply -k scenarios/21-http-grpc-shared-port/"

[tasks."scenario:21:delete"]
description = "Delete the shared-port HTTP + gRPC Gateway API scenario"
run = "kubectl delete -k scenarios/21-http-grpc-shared-port/ --ignore-not-found"

[tasks."scenario:21:restart"]
description = "Tear down and recreate the shared-port HTTP + gRPC Gateway API scenario"
depends = ["scenario:21:delete"]
run = "mise run scenario:21:start"

[tasks."scenario:21:verify"]
description = "Verify the shared-port HTTP + gRPC Gateway API scenario"
run = """
set -euo pipefail
kubectl wait pod/api -n backend-a --for=condition=Ready --timeout=60s
kubectl wait pod/api -n backend-b --for=condition=Ready --timeout=60s
kubectl wait pod/grpc-api -n backend-a --for=condition=Ready --timeout=60s
kubectl wait pod/grpc-api -n backend-b --for=condition=Ready --timeout=60s
kubectl wait pod/netshoot-client -n client --for=condition=Ready --timeout=60s
kubectl wait certificate/shared-port-gateway-certificate -n gateway-system --for=condition=Ready --timeout=180s
kubectl wait gateway/shared-port-gateway -n gateway-system --for='jsonpath={.status.conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait httproute/backend-a-https-route -n backend-a --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait httproute/backend-b-https-route -n backend-b --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait grpcroute/backend-a-grpc-route -n backend-a --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s
kubectl wait grpcroute/backend-b-grpc-route -n backend-b --for='jsonpath={.status.parents[0].conditions[?(@.type=="Accepted")].status}=True' --timeout=120s

echo "--- gRPC checks (shared port 443) ---"
grpcurl -insecure \
  -authority backend-grpc.example.test \
  -proto apps/backend-grpc/proto/grpc/testing/testservice.proto \
  -d '{"response_size":32,"fill_server_id":true}' \
  localhost:443 \
  grpc.testing.TestService/UnaryCall >/dev/null
echo "PASS: gRPC backend-a on port 443"
grpcurl -insecure \
  -authority backend-grpc-b.example.test \
  -proto apps/backend-grpc/proto/grpc/testing/testservice.proto \
  -d '{"response_size":32,"fill_server_id":true}' \
  localhost:443 \
  grpc.testing.TestService/UnaryCall >/dev/null
echo "PASS: gRPC backend-b on port 443"

echo "--- HTTPS checks (shared port 443) ---"
curl -kfsS --resolve "backend.example.test:443:127.0.0.1" https://backend.example.test/headers >/dev/null
echo "PASS: HTTPS backend-a on port 443"
curl -kfsS --resolve "backend-b.example.test:443:127.0.0.1" https://backend-b.example.test/headers >/dev/null
echo "PASS: HTTPS backend-b on port 443"
"""

[tasks."cluster:start"]
description = "Bootstrap the full cluster: kind + Cilium in order"
depends = ["kind:start"]
depends_post = ["cluster:verify"]
run = "mise run cilium:install && cilium status --wait"
run_windows = "mise run cilium:install && cilium status --wait"

[tasks."cluster:start:lb"]
description = "Bootstrap the load-balancer comparison cluster: kind + Cilium load-balancer mode"
depends = ["kind:start:lb"]
depends_post = ["cluster:verify"]
run = "mise run cilium:install:lb && cilium status --wait"
run_windows = "mise run cilium:install:lb && cilium status --wait"

[tasks."cluster:verify"]
description = "Verify the cluster is healthy: Cilium status ready"
run = ["cilium status --wait"]

[tasks."cluster:delete"]
description = "Delete the full cluster"
run = "mise run kind:delete"

[tasks."cluster:restart"]
description = "Delete and fully rebuild the cluster"
depends = ["cluster:delete"]
run = "mise run cluster:start"

[tasks."cluster:restart:lb"]
description = "Delete and fully rebuild the load-balancer comparison cluster"
depends = ["cluster:delete"]
run = "mise run cluster:start:lb"
