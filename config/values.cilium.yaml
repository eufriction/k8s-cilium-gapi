# Cilium Helm values for kube-proxy-free mode
# https://docs.cilium.io/en/stable/network/kubernetes/kubeproxy-free/
# Version is pinned via CILIUM_VERSION in mise.toml and passed to helm install --version

# Enable kube-proxy replacement
kubeProxyReplacement: true

# Enable Gateway API for Cilium Service Mesh testing
gatewayAPI:
  enabled: true
  # Required for TLS-terminated gRPC listeners so clients can negotiate HTTP/2.
  enableAlpn: true
  hostNetwork:
    enabled: true

# Keep the Ingress controller disabled
ingressController:
  enabled: false

# k8sServiceHost and k8sServicePort are resolved dynamically at install time
# via docker inspect in the cilium:install mise task

# Use VXLAN tunnel mode (required for kind)
tunnelProtocol: vxlan

# Match the podSubnet defined in kind/kind.config
ipam:
  mode: kubernetes

# Enable Hubble observability
hubble:
  enabled: true
  relay:
    enabled: true
    image:
      useDigest: false
  ui:
    enabled: true
    backend:
      image:
        useDigest: false
    frontend:
      image:
        useDigest: false

# Enable policy enforcement
policyAuditMode: false

# Disable digest-pinned image references so that kind load docker-image
# (which registers images by tag only) actually satisfies the kubelet’s
# image lookup.  Without this, containerd sees @sha256:... in the pod
# spec, fails the local digest lookup, and pulls from the registry
# anyway — making the entire preload pipeline a no-op.
image:
  useDigest: false
operator:
  image:
    useDigest: false
envoy:
  image:
    useDigest: false
